<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clarification Response</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-3xl bg-white rounded-2xl shadow-xl overflow-hidden">

  <div class="bg-gradient-to-r from-blue-600 to-indigo-600 px-8 py-6">
    <h1 class="text-2xl font-bold text-white">Additional Information Required</h1>
    <p class="text-blue-100 text-sm mt-1">
      Round <span id="roundNum">1</span> — Application <span id="appIdDisplay" class="font-mono"></span>
    </p>
  </div>

  <div class="p-8">

    <!-- Debug Info (íăßä ĹÎÝÇÄĺ áÇÍŢđÇ) -->
    <div id="debugPanel" class="mb-4 p-3 bg-slate-100 rounded-lg text-xs font-mono text-slate-600 hidden">
      <div>App ID: <span id="debugAppId"></span></div>
      <div>Storage Key: <span id="debugKey"></span></div>
      <div>Draft Status: <span id="debugStatus"></span></div>
      <button onclick="testStorage()" class="mt-2 px-2 py-1 bg-blue-600 text-white rounded text-xs">Test Storage</button>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-12">
      <div class="w-10 h-10 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-slate-500">Loading questions...</p>
    </div>

    <!-- Load Error -->
    <div id="loadError" class="hidden bg-red-50 border border-red-200 rounded-xl p-6 text-center">
      <h3 class="text-lg font-semibold text-red-800">Failed to Load Questions</h3>
      <p id="loadErrorMsg" class="text-red-600 mt-1"></p>
      <button onclick="location.reload()" class="mt-3 px-4 py-2 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 transition">Try Again</button>
    </div>

    <!-- Form -->
    <form id="clarificationForm" class="hidden space-y-6">
      
      <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 flex justify-between items-center">
        <p class="text-amber-800 text-sm">
          Please answer <strong>all</strong> questions below in detail.
        </p>
        <div class="flex items-center gap-2">
          <span id="saveStatus" class="text-xs text-slate-400">Ready</span>
          <button type="button" onclick="saveDraftManual()" class="text-xs px-2 py-1 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 transition">Save Now</button>
        </div>
      </div>

      <input type="hidden" name="application_id" id="appIdInput">
      <input type="hidden" name="clarification_round" id="roundInput">

      <div id="questionsContainer" class="space-y-6"></div>

      <!-- Inline Submit Error -->
      <div id="submitError" class="hidden bg-red-50 border border-red-200 rounded-lg p-4 text-center">
        <p id="submitErrorMsg" class="text-red-700 text-sm font-medium"></p>
        <button type="button" onclick="hideSubmitError()" class="mt-2 text-xs text-red-500 underline">Dismiss</button>
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold py-3 rounded-lg hover:from-blue-700 hover:to-indigo-700 transition flex items-center justify-center gap-2">
        <span>Submit All Answers</span>
        <svg id="spinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </button>
    </form>

    <!-- Success -->
    <div id="result" class="hidden mt-6">
      <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-6 text-center">
        <div class="w-14 h-14 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-3">
          <svg class="w-7 h-7 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        <h3 class="text-lg font-semibold text-emerald-800">Answers Submitted!</h3>
        <p class="text-emerald-600 mt-1">Thank you. Your application will now proceed to final evaluation.</p>
      </div>
    </div>

  </div>
</div>

<script>
// ?????????????????????????????????????????????
// CONFIG
// ?????????????????????????????????????????????
const N8N_BASE = 'https://grant-n8n-proxy.mohummadsultan0.workers.dev';
const WEBHOOK_SECRET = 'grant-secure-2026-kimi-key';

const params = new URLSearchParams(location.search);
const appId = params.get('id') || 'UNKNOWN';
const round = params.get('round') || '1';

// ?? ÚŃÖ ăÚáćăÇĘ ÇáĘŐÍíÍ ??
document.getElementById('appIdDisplay').textContent = appId;
document.getElementById('roundNum').textContent = round;
document.getElementById('appIdInput').value = appId;
document.getElementById('roundInput').value = round;

// ?? ăÝĘÇÍ ÇáĘÎŇíä: äÓĘÎĎă appId ăä URL ĎÇĆăđÇ ??
const STORAGE_KEY = 'grant_draft_' + appId;
const QUESTIONS_URL = `https://project-n8n-2026.app.n8n.cloud/webhook/questions-x7k9m2p-2026?id=${encodeURIComponent(appId)}`;
const SUBMIT_URL = `${N8N_BASE}/clarification`;

let questionsList = [];

// ?? ĘÍĎíË áćÍÉ ÇáĘŐÍíÍ ??
function updateDebug() {
  document.getElementById('debugAppId').textContent = appId;
  document.getElementById('debugKey').textContent = STORAGE_KEY;
  const hasDraft = localStorage.getItem(STORAGE_KEY);
  document.getElementById('debugStatus').textContent = hasDraft ? 'Found (' + hasDraft.length + ' chars)' : 'None';
}

// ?? ÇÎĘČÇŃ ÇáĘÎŇíä ??
function testStorage() {
  try {
    localStorage.setItem('test_key', 'hello');
    const val = localStorage.getItem('test_key');
    localStorage.removeItem('test_key');
    alert('localStorage works! Value: ' + val);
  } catch (e) {
    alert('localStorage FAILED: ' + e.message);
  }
}

// ?? ÍÝŮ íĎćí ??
function saveDraftManual() {
  saveDraft();
  const status = document.getElementById('saveStatus');
  status.textContent = '? Saved manually';
  status.className = 'text-xs text-emerald-600 font-semibold';
  setTimeout(() => {
    status.textContent = 'Draft saved';
    status.className = 'text-xs text-slate-400';
  }, 2000);
  updateDebug();
}

// ?? ÍÝŮ ĘáŢÇĆí ??
function saveDraft() {
  try {
    const textareas = document.querySelectorAll('textarea[name^="answer_"]');
    if (textareas.length === 0) {
      console.log('?? No textareas found to save');
      return;
    }

    const draft = [];
    textareas.forEach((ta, i) => {
      draft.push({
        index: i,
        answer: ta.value,
        question: ta.getAttribute('data-question') || ''
      });
    });

    const payload = {
      appId: appId,
      round: round,
      savedAt: new Date().toISOString(),
      answers: draft
    };

    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    console.log('?? Saved to', STORAGE_KEY, payload);

    // ĹŮĺÇŃ "Saved" ăÄŢĘđÇ
    const status = document.getElementById('saveStatus');
    status.textContent = '? Saved';
    status.className = 'text-xs text-emerald-600 font-semibold';
    setTimeout(() => {
      status.textContent = 'Draft saved';
      status.className = 'text-xs text-slate-400';
    }, 1500);

    updateDebug();
  } catch (e) {
    console.error('? Failed to save draft:', e);
    alert('Cannot save draft: ' + e.message);
  }
}

// ?? ÇÓĘŃĚÇÚ ÇáăÓćĎÉ ??
function restoreDraft() {
  try {
    console.log('?? Looking for draft with key:', STORAGE_KEY);
    const raw = localStorage.getItem(STORAGE_KEY);
    
    if (!raw) {
      console.log('?? No draft found');
      return false;
    }

    const draft = JSON.parse(raw);
    console.log('?? Found draft:', draft);

    if (!draft.answers || !Array.isArray(draft.answers)) {
      console.log('?? Draft has no answers array');
      return false;
    }

    const textareas = document.querySelectorAll('textarea[name^="answer_"]');
    let restoredCount = 0;

    draft.answers.forEach(item => {
      const ta = textareas[item.index];
      if (ta && item.answer) {
        ta.value = item.answer;
        restoredCount++;
        console.log('? Restored answer', item.index);
      }
    });

    if (restoredCount > 0) {
      const status = document.getElementById('saveStatus');
      status.textContent = '? ' + restoredCount + ' restored';
      status.className = 'text-xs text-blue-600 font-semibold';
      console.log('? Restored', restoredCount, 'answers');
    }

    updateDebug();
    return restoredCount > 0;
  } catch (e) {
    console.error('? Failed to restore draft:', e);
    return false;
  }
}

// ?? ĹÎÝÇÁ ÎŘĂ ÇáĹŃÓÇá ??
function hideSubmitError() {
  document.getElementById('submitError').classList.add('hidden');
}

// ?? ĘÍăíá ÇáĂÓĆáÉ ??
async function loadQuestions() {
  try {
    console.log('?? Fetching questions from:', QUESTIONS_URL);
    const res = await fetch(QUESTIONS_URL, {
      method: 'GET',
      headers: { 'Accept': 'application/json' }
    });

    if (!res.ok) throw new Error('Server returned ' + res.status);

    const data = await res.json();
    console.log('?? Raw response:', data);

    let rawQuestions = null;

    if (data.json && data.json.questions) {
      rawQuestions = data.json.questions;
    } else if (data.questions) {
      rawQuestions = data.questions;
    } else if (data.json && data.json.clarification_questions) {
      rawQuestions = data.json.clarification_questions;
    } else if (data.clarification_questions) {
      rawQuestions = data.clarification_questions;
    }

    if (typeof rawQuestions === 'string') {
      try {
        const parsed = JSON.parse(rawQuestions);
        rawQuestions = parsed.questions || parsed;
      } catch (e) {
        rawQuestions = [];
      }
    }

    if (rawQuestions && typeof rawQuestions === 'object' && !Array.isArray(rawQuestions) && rawQuestions.questions) {
      rawQuestions = rawQuestions.questions;
    }

    questionsList = Array.isArray(rawQuestions) ? rawQuestions : [];

    if (questionsList.length === 0) {
      showNoQuestions();
      return;
    }

    renderQuestions();
    
    // ÇÓĘŃĚÚ ÇáăÓćĎÉ ČÚĎ ŃÓă ÇáĂÓĆáÉ
    const restored = restoreDraft();
    console.log('?? Restore result:', restored);

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('clarificationForm').classList.remove('hidden');
    updateDebug();

  } catch (err) {
    console.error('? Load error:', err);
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('loadError').classList.remove('hidden');
    document.getElementById('loadErrorMsg').textContent = err.message || 'Unable to load questions.';
  }
}

// ?? ŃÓă ÇáĂÓĆáÉ ??
function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';

  questionsList.forEach((q, i) => {
    const questionText = typeof q === 'string' ? q : (q.question || q.text || JSON.stringify(q));

    const div = document.createElement('div');
    div.className = 'bg-slate-50 border border-slate-200 rounded-xl p-5 space-y-3';
    div.innerHTML = `
      <div class="flex items-start gap-3">
        <span class="flex-shrink-0 w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center text-sm font-bold">${i + 1}</span>
        <p class="text-slate-800 font-medium leading-relaxed pt-1">${escapeHtml(questionText)}</p>
      </div>
      <textarea
        name="answer_${i}"
        data-question="${escapeHtml(questionText)}"
        required
        rows="4"
        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none text-slate-700 bg-white"
        placeholder="Type your detailed answer here..."
      ></textarea>
    `;
    container.appendChild(div);
  });

  // ŃČŘ ÍĎË ÇáÍÝŮ ÇáĘáŢÇĆí
  document.querySelectorAll('textarea[name^="answer_"]').forEach(ta => {
    ta.addEventListener('input', saveDraft);
  });
}

function showNoQuestions() {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('clarificationForm').classList.remove('hidden');
  document.getElementById('submitBtn').classList.add('hidden');

  document.getElementById('questionsContainer').innerHTML = `
    <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-6 text-center">
      <div class="w-14 h-14 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-3">
        <svg class="w-7 h-7 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      <h3 class="text-lg font-semibold text-emerald-800">No Clarification Needed</h3>
      <p class="text-emerald-600 mt-1">Your application is clear and complete. Proceeding to evaluation.</p>
    </div>
  `;
}

// ?? ĹŃÓÇá ÇáĹĚÇČÇĘ ??
document.getElementById('clarificationForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideSubmitError();

  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  btn.disabled = true;
  spinner.classList.remove('hidden');

  const answersArray = [];
  const textareas = document.querySelectorAll('textarea[name^="answer_"]');

  textareas.forEach((ta, i) => {
    answersArray.push({
      question: ta.getAttribute('data-question') || questionsList[i] || `Question ${i + 1}`,
      answer: ta.value.trim()
    });
  });

  const payload = {
    application_id: appId,
    clarification_round: parseInt(round),
    answers: answersArray,
    received_at: new Date().toISOString()
  };

  try {
    const res = await fetch(SUBMIT_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json',
        'X-Webhook-Secret': WEBHOOK_SECRET  
      },
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    let data = {};
    try {
      data = JSON.parse(text);
    } catch {
      data = { raw: text.substring(0, 200) };
    }

    if (!res.ok || data.error === true || data.error_code) {
      throw new Error(data.message || data.error_code || 'Server error: ' + res.status);
    }

    // ? äĚÇÍ: ÇăÓÍ ÇáăÓćĎÉ
    localStorage.removeItem(STORAGE_KEY);
    console.log('??? Draft cleared');
    
    document.getElementById('clarificationForm').classList.add('hidden');
    document.getElementById('result').classList.remove('hidden');

  } catch (err) {
    console.error('? Submit error:', err);
    
    btn.disabled = false;
    spinner.classList.add('hidden');
    
    const errorBox = document.getElementById('submitError');
    const errorMsg = document.getElementById('submitErrorMsg');
    errorBox.classList.remove('hidden');
    errorMsg.textContent = (err.message || 'Submission failed') + '. Your answers are saved in this browser — you can try again.';
  }
});

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ?? ČĎÁ ÇáĘÔŰíá ??
console.log('?? Page loaded. App ID:', appId, 'Storage Key:', STORAGE_KEY);
updateDebug();
loadQuestions();
</script>

</body>
</html>
