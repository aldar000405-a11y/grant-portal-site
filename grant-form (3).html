<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grant Application Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;}</style>
  <base target="_blank">
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-3xl bg-white rounded-2xl shadow-xl overflow-hidden">
  <div class="bg-gradient-to-r from-emerald-600 to-teal-600 px-8 py-6">
    <h1 class="text-2xl font-bold text-white">Grant Application</h1>
    <p class="text-emerald-100 text-sm mt-1">Apply for funding to support your impactful project</p>
  </div>

  <form id="grantForm" class="p-8 space-y-5">
    <div class="grid md:grid-cols-2 gap-5">
      <div><label class="block text-sm font-medium text-slate-700 mb-1">Full Name *</label><input type="text" name="name" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="John Doe"></div>
      <div><label class="block text-sm font-medium text-slate-700 mb-1">Email Address *</label><input type="email" name="email" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="john@example.com"></div>
      <div><label class="block text-sm font-medium text-slate-700 mb-1">Organization</label><input type="text" name="organization" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Your NGO / Company"></div>
      <div><label class="block text-sm font-medium text-slate-700 mb-1">Contact Phone</label><input type="tel" name="contact_phone" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="+1 234 567 890"></div>
      <div class="md:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1">Project Title *</label><input type="text" name="project_title" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="e.g. Solar Wells for Rural Kenya"></div>
      <div><label class="block text-sm font-medium text-slate-700 mb-1">Sector</label><select name="sector" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none bg-white"><option>Environment</option><option>Education</option><option>Health</option><option>Poverty Alleviation</option><option>Technology</option><option>Arts & Culture</option><option>General</option></select></div>
      <div><label class="block text-sm font-medium text-slate-700 mb-1">Budget Requested (USD) *</label><input type="number" name="budget" required min="1" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="50000"></div>
      <div><label class="block text-sm font-medium text-slate-700 mb-1">Timeline</label><input type="text" name="timeline" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="e.g. 12 months"></div>
      <div><label class="block text-sm font-medium text-slate-700 mb-1">Location</label><input type="text" name="location" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="e.g. Tana River County, Kenya"></div>
      <div class="md:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1">Beneficiaries</label><input type="text" name="beneficiaries" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="e.g. 5000 rural residents"></div>
      <div class="md:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1">Previous Funding</label><input type="text" name="previous_funding" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="None or previous grants"></div>
      <div class="md:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1">Project Description *</label><textarea name="description" required rows="5" minlength="20" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none resize-none" placeholder="Describe your project in detail (minimum 20 characters)..."></textarea></div>
    </div>
    <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-semibold py-3 rounded-lg hover:from-emerald-700 hover:to-teal-700 transition flex items-center justify-center gap-2">
      <span>Submit Application</span>
      <svg id="spinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
    </button>
  </form>

  <!-- Success / Clarification / Any success:true response -->
  <div id="result" class="hidden px-8 pb-8">
    <div id="resultCard" class="bg-emerald-50 border border-emerald-200 rounded-xl p-6 text-center">
      <div id="resultIconWrap" class="w-14 h-14 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-3">
        <svg id="resultIcon" class="w-7 h-7 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
      </div>
      <h3 id="resultTitle" class="text-lg font-semibold text-emerald-800">Application Submitted!</h3>
      <p id="resultMessage" class="text-emerald-700 mt-2 text-sm"></p>

      <div class="mt-4 bg-white border border-emerald-200 rounded-lg p-4 text-left text-sm space-y-2">
        <div class="flex justify-between items-center border-b border-slate-100 py-2">
          <span class="text-slate-500">Application ID</span>
          <span id="appId" class="font-semibold text-slate-800 font-mono">N/A</span>
        </div>
        <div class="flex justify-between items-center border-b border-slate-100 py-2">
          <span class="text-slate-500">Status</span>
          <span id="appStatus" class="font-semibold text-slate-800">N/A</span>
        </div>
        <div id="extraFields" class="space-y-2"></div>
      </div>

      <p id="resultFooter" class="text-sm text-emerald-600 mt-4"></p>
      <button onclick="resetForm()" class="mt-4 px-4 py-2 bg-emerald-100 text-emerald-700 rounded-lg hover:bg-emerald-200 transition text-sm font-medium">Submit Another Application</button>
    </div>
  </div>

  <!-- Dynamic Response Block (for success:false) -->
  <div id="dynamicBlock" class="hidden px-8 pb-8">
    <div id="dynCard" class="border rounded-xl p-6 text-center">
      <div id="dynIconWrap" class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-3">
        <svg id="dynIcon" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
      </div>
      <h3 id="dynTitle" class="text-lg font-semibold">Response</h3>
      <p id="dynMessage" class="mt-2 text-sm"></p>
      <div id="dynDetails" class="mt-4 bg-white border rounded-lg p-4 text-left text-sm space-y-2"></div>
      <p id="dynFooter" class="text-xs text-slate-400 mt-4"></p>
    </div>
  </div>

  <!-- General Error -->
  <div id="error" class="hidden px-8 pb-8">
    <div class="bg-red-50 border border-red-200 rounded-xl p-6 text-center">
      <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-3">
        <svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </div>
      <h3 class="text-lg font-semibold text-red-800">Submission Failed</h3>
      <p id="errorMsg" class="text-red-600 mt-1"></p>
      <button onclick="resetForm()" class="mt-3 px-4 py-2 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 transition">Try Again</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIGURATION ──────────────────────────────────────────────
// غيّر هذين القيمتين فقط:
const WEBHOOK_URL = 'https://grant-n8n-proxy.mohummadsultan0.workers.dev';
const WEBHOOK_SECRET = 'grant-secure-2026-kimi-key'; // نفس القيمة في n8n Header Auth

function resetForm() {
  document.getElementById('grantForm').reset();
  document.getElementById('grantForm').classList.remove('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('dynamicBlock').classList.add('hidden');
  document.getElementById('error').classList.add('hidden');
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('spinner').classList.add('hidden');
}

// ─── CLIENT-SIDE VALIDATION ─────────────────────────────────────
function validateForm(data) {
  const errors = [];
  
  if (!data.name || data.name.trim().length < 2) {
    errors.push('Full name is required (min 2 characters)');
  }
  if (!data.email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) {
    errors.push('Valid email address is required');
  }
  if (!data.project_title || data.project_title.trim().length < 3) {
    errors.push('Project title is required');
  }
  if (!data.budget || parseFloat(data.budget) <= 0) {
    errors.push('Budget must be greater than 0');
  }
  if (!data.description || data.description.trim().length < 20) {
    errors.push('Description must be at least 20 characters');
  }
  
  return errors;
}

function renderDynamic(data) {
  const block = document.getElementById('dynamicBlock');
  const card = document.getElementById('dynCard');
  const iconWrap = document.getElementById('dynIconWrap');
  const title = document.getElementById('dynTitle');
  const message = document.getElementById('dynMessage');
  const details = document.getElementById('dynDetails');
  const footer = document.getElementById('dynFooter');

  const code = data.error_code || '';
  const isRejection = code.includes('REJECTION') || code.includes('BLOCK') || code.includes('LIMIT');
  const isCooldown = code.includes('COOLDOWN') || code.includes('PERIOD');

  let theme = 'amber';
  if (isRejection) theme = 'red';
  else if (isCooldown) theme = 'orange';
  else if (data.success === false) theme = 'amber';

  const colors = {
    red:    { bg: 'bg-red-50',    border: 'border-red-200',    text: 'text-red-800',    sub: 'text-red-700',    iconBg: 'bg-red-100',    icon: 'text-red-600' },
    orange: { bg: 'bg-orange-50', border: 'border-orange-200', text: 'text-orange-800', sub: 'text-orange-700', iconBg: 'bg-orange-100', icon: 'text-orange-600' },
    amber:  { bg: 'bg-amber-50',  border: 'border-amber-200',  text: 'text-amber-800',  sub: 'text-amber-700',  iconBg: 'bg-amber-100',  icon: 'text-amber-600' },
    emerald:{ bg: 'bg-emerald-50',border: 'border-emerald-200',text: 'text-emerald-800',sub: 'text-emerald-700',iconBg: 'bg-emerald-100',icon: 'text-emerald-600' }
  }[theme];

  card.className = `${colors.bg} ${colors.border} border rounded-xl p-6 text-center`;
  iconWrap.className = `w-14 h-14 ${colors.iconBg} rounded-full flex items-center justify-center mx-auto mb-3`;
  document.getElementById('dynIcon').className = `w-7 h-7 ${colors.icon}`;
  title.className = `text-lg font-semibold ${colors.text}`;
  message.className = `mt-2 text-sm ${colors.sub}`;

  title.textContent = code.replace(/_/g, ' ') || 'Application Update';
  message.textContent = data.message || 'Your application could not be processed at this time.';
  footer.textContent = 'Please review the details above before proceeding.';

  details.innerHTML = '';
  const skipKeys = ['success', 'error', 'error_code', 'message', 'status'];
  const entries = Object.entries(data).filter(([k]) => !skipKeys.includes(k));

  if (entries.length === 0) {
    details.classList.add('hidden');
  } else {
    details.classList.remove('hidden');
    details.className = `mt-4 bg-white border ${colors.border} rounded-lg p-4 text-left text-sm space-y-2`;
    entries.forEach(([key, value]) => {
      const row = document.createElement('div');
      row.className = 'flex justify-between items-start border-b border-slate-100 py-2 last:border-0';
      const label = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
      const display = (value !== null && value !== undefined) ? String(value) : 'N/A';
      row.innerHTML = `<span class="text-slate-500 capitalize mr-4">${label}</span><span class="font-semibold text-slate-800 text-right break-all">${display}</span>`;
      details.appendChild(row);
    });
  }

  block.classList.remove('hidden');
}

function renderSuccess(data) {
  const result = document.getElementById('result');
  const card = document.getElementById('resultCard');
  const iconWrap = document.getElementById('resultIconWrap');
  const icon = document.getElementById('resultIcon');
  const title = document.getElementById('resultTitle');
  const message = document.getElementById('resultMessage');
  const appId = document.getElementById('appId');
  const appStatus = document.getElementById('appStatus');
  const footer = document.getElementById('resultFooter');
  const extraFields = document.getElementById('extraFields');

  const status = (data.status || '').toLowerCase();
  const isClarification = status.includes('clarification');
  const isRejected = status.includes('rejected') || status.includes('denied');

  let theme = 'emerald';
  if (isRejected) theme = 'red';
  else if (isClarification) theme = 'amber';

  const colors = {
    emerald: { bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-800', sub: 'text-emerald-700', iconBg: 'bg-emerald-100', icon: 'text-emerald-600' },
    amber:   { bg: 'bg-amber-50',  border: 'border-amber-200',  text: 'text-amber-800',  sub: 'text-amber-700',  iconBg: 'bg-amber-100',  icon: 'text-amber-600' },
    red:     { bg: 'bg-red-50',    border: 'border-red-200',    text: 'text-red-800',    sub: 'text-red-700',    iconBg: 'bg-red-100',    icon: 'text-red-600' }
  }[theme];

  card.className = `${colors.bg} ${colors.border} border rounded-xl p-6 text-center`;
  iconWrap.className = `w-14 h-14 ${colors.iconBg} rounded-full flex items-center justify-center mx-auto mb-3`;
  icon.className = `w-7 h-7 ${colors.icon}`;
  title.className = `text-lg font-semibold ${colors.text}`;
  message.className = `mt-2 text-sm ${colors.sub}`;
  footer.className = `text-sm ${colors.sub} mt-4`;

  appId.textContent = data.application_id || 'N/A';
  appStatus.textContent = data.status || 'N/A';
  message.textContent = data.message || 'Your application has been received.';
  footer.textContent = data.footer || 'You will receive an email update within 24 hours.';

  extraFields.innerHTML = '';
  const skipKeys = ['success', 'error', 'error_code', 'application_id', 'status', 'message', 'footer'];
  const entries = Object.entries(data).filter(([k]) => !skipKeys.includes(k));

  entries.forEach(([key, value]) => {
    const row = document.createElement('div');
    row.className = 'flex justify-between items-start border-b border-slate-100 py-2 last:border-0';
    const label = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    const display = (value !== null && value !== undefined) ? String(value) : 'N/A';
    row.innerHTML = `<span class="text-slate-500 capitalize mr-4">${label}</span><span class="font-semibold text-slate-800 text-right break-all">${display}</span>`;
    extraFields.appendChild(row);
  });

  result.classList.remove('hidden');
}

document.getElementById('grantForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  btn.disabled = true;
  spinner.classList.remove('hidden');

  const formData = new FormData(e.target);
  const payload = {};
  formData.forEach((v, k) => payload[k] = v);
  payload.budget = parseFloat(payload.budget) || 0;

  // ─── CLIENT-SIDE VALIDATION GATE ──────────────────────────────
  const validationErrors = validateForm(payload);
  if (validationErrors.length > 0) {
    btn.disabled = false;
    spinner.classList.add('hidden');
    alert('Please fix the following:\n\n• ' + validationErrors.join('\n• '));
    return;
  }

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    document.getElementById('grantForm').classList.add('hidden');

    if (data.error === true) {
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('errorMsg').textContent = data.message || 'An unexpected error occurred.';
      return;
    }

    if (data.success === false) {
      renderDynamic(data);
      return;
    }

    if (data.success === true) {
      renderSuccess(data);
      return;
    }

    renderDynamic({
      error_code: 'UNKNOWN_RESPONSE',
      message: 'Received an unexpected response from the server.',
      ...data
    });

  } catch (err) {
    document.getElementById('grantForm').classList.add('hidden');
    document.getElementById('error').classList.remove('hidden');
    document.getElementById('errorMsg').textContent = err.message || 'Please check your connection and try again.';
  }
});
</script>
</body>
</html>
